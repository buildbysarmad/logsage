# LogSage Frontend — Netlify Configuration
# Domain: logsage.dev

[build]
  base = "logsage-web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Production environment variables
# Set these in Netlify UI → Site settings → Environment variables
# NEXT_PUBLIC_API_URL=https://logsage-production.up.railway.app
# NEXT_PUBLIC_PRICING_ENABLED=false
# NEXT_PUBLIC_AI_ENABLED=false

[[redirects]]
  from = "/api/*"
  to = "https://logsage-production.up.railway.app/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Next.js specific settings
[[plugins]]
  package = "@netlify/plugin-nextjs"
