name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test-api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/buildbysarmad/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore logsage-backend/LogSage.Api/LogSage.Api.csproj

      - name: Build
        run: dotnet build logsage-backend/LogSage.Api/LogSage.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test logsage-backend/LogSage.Api.Tests/LogSage.Api.Tests.csproj --configuration Release --no-build --verbosity normal
