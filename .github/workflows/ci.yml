name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test-api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Add GitHub Packages NuGet source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/buildbysarmad/index.json" \
            --name github-buildbysarmad \
            --username buildbysarmad \
            --password ${{ secrets.NUGET_READ_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore logsage-backend/LogSage.Api/LogSage.Api.csproj

      - name: Build
        run: dotnet build logsage-backend/LogSage.Api/LogSage.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test logsage-backend/LogSage.Api.Tests/LogSage.Api.Tests.csproj --configuration Release --no-build --verbosity normal

  build-and-test-web:
    name: Web — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: logsage-web/package-lock.json

      - name: Install dependencies
        working-directory: logsage-web
        run: npm ci

      - name: Type check
        working-directory: logsage-web
        run: npm run type-check

      - name: Lint
        working-directory: logsage-web
        run: npm run lint

      - name: Test
        working-directory: logsage-web
        run: npm test

      - name: Build
        working-directory: logsage-web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5020
          NEXT_PUBLIC_PRICING_ENABLED: false
          NEXT_PUBLIC_AI_ENABLED: false
