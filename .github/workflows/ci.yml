name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test-backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore loglens-backend/LogLens.Core/LogLens.Core.csproj

      - name: Build
        run: dotnet build loglens-backend/LogLens.Core/LogLens.Core.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test loglens-backend/LogLens.Core.Tests/LogLens.Core.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./coverage

  build-and-test-api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore loglens-backend/LogLens.Api/LogLens.Api.csproj

      - name: Build
        run: dotnet build loglens-backend/LogLens.Api/LogLens.Api.csproj --no-restore --configuration Release
