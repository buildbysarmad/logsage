name: CD — Production

on:
  push:
    branches: [main]

jobs:
  deploy-backend-production:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Add GitHub Packages NuGet source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/buildbysarmad/index.json" \
            --name github-buildbysarmad \
            --username buildbysarmad \
            --password ${{ secrets.NUGET_READ_TOKEN }} \
            --store-password-in-clear-text

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service logsage-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      - name: Health check
        run: sleep 30 && curl --fail https://api.logsage.dev/health

  deploy-frontend-production:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend-production
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: logsage-web/package-lock.json

      - name: Install dependencies
        working-directory: logsage-web
        run: npm ci

      - name: Build
        working-directory: logsage-web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.logsage.dev
          NEXT_PUBLIC_PRICING_ENABLED: false
          NEXT_PUBLIC_AI_ENABLED: false

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './logsage-web/.next'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Health check
        run: sleep 15 && curl --fail https://logsage.dev

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-backend-production, deploy-frontend-production]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get version
        id: version
        run: echo "version=v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## LogSage Production Deployment

            **Deployed to:** https://logsage.dev
            **API:** https://api.logsage.dev
            **Commit:** ${{ github.sha }}

            ### Changes
            See commit history for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
